name: Deploy Storybook + Release Bundle

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Auto bump version (patch)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=v$NEW_VERSION" >> $GITHUB_ENV
          git add package.json
          git commit -m "chore: release v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push --follow-tags

      - name: Build Storybook + bundle
        run: npm run build-storybook

      - name: Copy CSS to Pages root (CDN URL)
        run: node -e "const fs=require('fs'); fs.copyFileSync('dist/datta-system.css', 'storybook-static/datta-system.css'); console.log('✅ CSS copiado')"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Datta System ${{ env.VERSION }}"
          body: |
            ## Datta System ${{ env.VERSION }}

            ### ⬇ Download
            Baixe o bundle completo (CSS + fontes) nos assets abaixo.

            ### 🌐 CDN (GitHub Pages — sempre versão mais recente)
            ```html
            <link rel="stylesheet" href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/datta-system.css">
            ```

            ### 📦 @import direto
            ```css
            @import url("https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/datta-system.css");
            ```

            ### 📂 Conteúdo do bundle
            - **datta-system.css** — Compilado e minificado (tokens, temas, reset, estilos globais)
            - **datta-system-bundle.zip** — CSS + fontes (Inter, Manrope, Source Sans Pro, IBM Plex Sans)

            Acesse o [Storybook completo](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/) para documentação e exemplos.
          files: |
            dist/datta-system.css
            dist/datta-system-bundle.zip

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'storybook-static'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
